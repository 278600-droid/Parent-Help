          standard: 'https://v9.australiancurriculum.edu.au/f-10-curriculum/learning-areas/mathematics/year-5/' },
        { id: 'social', label: 'Peer Relationships & Mental Health', note: 'Bullying, social anxiety, self-esteem',
          expectation: 'Students develop healthy peer relationships, manage emotions constructively and seek help when experiencing social difficulties or bullying.',
          standard: 'https://v9.australiancurriculum.edu.au/f-10-curriculum/general-capabilities/personal-and-social-capability/' },
        { id: 'focus', label: 'Learning Motivation & Confidence', note: 'Engagement levels, homework completion',
          expectation: 'Students demonstrate motivation for learning, take responsibility for their own learning and complete homework and assigned tasks independently.',
          standard: 'https://v9.australiancurriculum.edu.au/f-10-curriculum/general-capabilities/personal-and-social-capability/' }
    ],
    'Year 6': [
        { id: 'reading', label: 'Reading Complex Texts', note: 'Language analysis, evaluating credibility',
          expectation: 'Students read complex texts fluently and with understanding. They analyse language choices, evaluate author credibility and synthesise information from multiple texts.',
          standard: 'https://v9.australiancurriculum.edu.au/f-10-curriculum/learning-areas/english/year-6/' },
        { id: 'writing', label: 'Writing with Purpose & Control', note: 'Multi-paragraph texts, audience awareness',
          expectation: 'Students write well-structured multi-paragraph texts for specific purposes and audiences. They use language precisely and check and refine their work.',
          standard: 'https://v9.australiancurriculum.edu.au/f-10-curriculum/learning-areas/english/year-6/' },
        { id: 'maths', label: 'Numeracy & Mathematical Reasoning', note: 'Algebra concepts, area/volume, data interpretation',
          expectation: 'Students apply mathematical reasoning and strategies to solve unfamiliar problems. They understand area and volume, apply percentages and interpret data.',
          standard: 'https://v9.australiancurriculum.edu.au/f-10-curriculum/learning-areas/mathematics/year-6/' },
        { id: 'social', label: 'Transition Readiness & Wellbeing', note: 'High school readiness, social concerns',
          expectation: 'Students demonstrate readiness for Year 7, showing independence, responsibility and positive peer relationships. They manage transitions and change positively.',
          standard: 'https://v9.australiancurriculum.edu.au/f-10-curriculum/general-capabilities/personal-and-social-capability/' },
        { id: 'focus', label: 'Academic Engagement & Readiness', note: 'Year 7 transition concerns, motivation',
          expectation: 'Students show sustained engagement in learning, demonstrate responsibility and are equipped with study skills and independence for secondary school.',
          standard: 'https://v9.australiancurriculum.edu.au/f-10-curriculum/general-capabilities/personal-and-social-capability/' }
    ]
};

function App() {
    const [tab, setTab] = useState('guide');
    const [year, setYear] = useState('');
    const [area, setArea] = useState('');
    const [showAi, setShowAi] = useState(false);
    const [aiResponse, setAiResponse] = useState('');
    const [aiAnswered, setAiAnswered] = useState(false);
    const [formData, setFormData] = useState({
        observations: '',
        frequency: '',
        duration: '',
        date: new Date().toISOString().split('T')[0]
    });
    const [isPaid, setIsPaid] = useState(false);
    const [reportGenerated, setReportGenerated] = useState(false);

    const handleAiSubmit = (e) => {
        e.preventDefault();
        const input = e.target.answer.value;
        setAiResponse(input);
        setFormData(prev => ({...prev, observations: input}));
        setAiAnswered(true);
    };

    const handleFormChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({...prev, [name]: value}));
    };

    const generateReport = () => {
        if (!year || !area) {
            alert('Please select year level and area');
            return;
        }
        setReportGenerated(true);
        setTab('preview');
    };

    return (
        <div className="container">
            <div className="header">
                <div className="header-content">
                    <div className="header-logo">
                        <div className="header-text">
                            <h1>Parent Help</h1>
                            <p>Confident conversations with your child's teacher</p>
                        </div>
                    </div>
                    <div className="header-badge">
                        <div className="badge-icon">🏠 🤝 🏫</div>
                        <div className="badge-text">
                            <strong>Home & School</strong>
                            <span>Working together for your child's success</span>
                        </div>
                    </div>
                </div>
            </div>

            <div className="tabs">
                <button className={`tab-btn ${tab === 'guide' ? 'active' : ''}`} onClick={() => setTab('guide')}>📝 Interactive Guide</button>
                <button className={`tab-btn ${tab === 'preview' ? 'active' : ''}`} onClick={() => setTab('preview')}>👁️ Preview Report</button>
                <button className={`tab-btn ${tab === 'pricing' ? 'active' : ''}`} onClick={() => setTab('pricing')}>💳 Report Generator</button>
            </div>

            <div className="content">
                {tab === 'guide' && (
                    <>
                        <div className="banner">
                            <h3>🎓 Designed by an Education Expert</h3>
                            <p><strong>25+ years of teaching experience</strong><br/>
                            <strong>PhD in Educational Philosophy</strong></p>
                            <p style={{marginTop: '1rem'}}>This app reflects research-backed best practices and real classroom insights. Built to help parents navigate conversations with confidence and clarity.</p>
                        </div>

                        <div className="section year-selection">
                            <h2>Step 1: Select Your Child's Year Level</h2>
                            <div className="radio-group">
                                {Object.keys(curriculumAreas).map(y => (
                                    <label key={y} className="radio-item">
                                        <input type="radio" name="year" value={y} checked={year === y} onChange={(e) => { setYear(e.target.value); setArea(''); setShowAi(false); }} />
                                        <div className="radio-label"><strong>{y}</strong></div>
                                    </label>
                                ))}
                            </div>
                        </div>

                        {year && !showAi && (
                            <div className="section area-selection">
                                <h2>Step 2: Select Area of Concern</h2>
                                <div className="radio-group">
                                    {curriculumAreas[year].map(a => (
                                        <label key={a.id} className="radio-item">
                                            <input type="radio" name="area" value={a.id} checked={area === a.id} onChange={(e) => setArea(e.target.value)} />
                                            <div className="radio-label"><strong>{a.label}</strong><span className="note">{a.note}</span></div>
                                        </label>
                                    ))}
                                </div>
                            </div>
                        )}

                        {area && !showAi && !aiAnswered && (
                            <div className="section">
                                <h2>Step 2b: Talk It Through</h2>
                                <p style={{marginBottom: '1.5rem'}}>Before filling in the form, describe what you've noticed. This helps clarify your thoughts.</p>
                                <button className="btn btn-primary" onClick={() => setShowAi(true)}>💬 Start Conversation</button>
                                <button className="btn btn-secondary" style={{marginLeft: '1rem'}} onClick={() => setAiAnswered(true)}>Skip to Form</button>
                            </div>
                        )}

                        {showAi && !aiAnswered && (
                            <div className="section">
                                <h2>Step 2b: Talk It Through</h2>
                                <div className="ai-chat">
                                    <div className="message assistant">Hi! Let's talk about {area.toLowerCase()} for {year}. In a few sentences, can you describe what you've noticed that made you concerned?</div>
                                </div>
                                <form onSubmit={handleAiSubmit}>
                                    <div className="form-group">
                                        <textarea name="answer" placeholder="Type your response..." required></textarea>
                                    </div>
                                    <button type="submit" className="btn btn-primary">Send</button>
                                </form>
                            </div>
                        )}

                        {aiAnswered && (
                            <div className="section">
                                <h2>Curriculum Context</h2>
                                <p style={{marginBottom: '1.5rem', fontSize: '0.95rem'}}>Here's what the Australian Curriculum expects at {year} for {curriculumAreas[year].find(a => a.id === area)?.label.toLowerCase()}:</p>
                                {curriculumAreas[year] && curriculumAreas[year].find(a => a.id === area) && (
                                    <div style={{background: '#f0f4f8', padding: '1.5rem', borderLeft: '4px solid #378ADD', marginBottom: '1.5rem', borderRadius: '6px'}}>
                                        <p style={{marginBottom: '1rem', fontSize: '0.95rem', fontStyle: 'italic'}}>"{curriculumAreas[year].find(a => a.id === area).expectation}"</p>
                                        <p style={{fontSize: '0.85rem', color: '#666'}}>
                                            <a href={curriculumAreas[year].find(a => a.id === area).standard} target="_blank" rel="noopener noreferrer" style={{color: '#378ADD', textDecoration: 'none'}}>
                                                📖 View full Australian Curriculum v9 →
                                            </a>
                                        </p>
                                    </div>
                                )}
                            </div>
                        )}

                        {aiAnswered && (
                            <div className="section">
                                <h2>Step 4: Your Concern in Context</h2>
                                <p style={{marginBottom: '1.5rem', fontSize: '0.95rem'}}>Here's how your observation aligns with what the curriculum expects:</p>
                                {curriculumAreas[year] && curriculumAreas[year].find(a => a.id === area) && (
                                    <div style={{background: '#fff3cd', padding: '1.5rem', borderLeft: '4px solid #ffc107', marginBottom: '1.5rem', borderRadius: '6px'}}>
                                        <p style={{marginBottom: '1rem', fontSize: '0.95rem'}}>
                                            <strong>What I've observed:</strong><br/>
                                            {formData.observations}
                                        </p>
                                        <p style={{marginBottom: '1rem', fontSize: '0.95rem', borderTop: '1px solid #ffc107', paddingTop: '1rem'}}>
                                            <strong>What the Australian Curriculum expects for {year}:</strong><br/>
                                            "{curriculumAreas[year].find(a => a.id === area).expectation}"
                                        </p>
                                        <p style={{fontSize: '0.95rem', color: '#856404', fontStyle: 'italic'}}>
                                            <strong>The gap:</strong> There appears to be a discrepancy between what my child is able to do at home and the {year} curriculum expectation for {curriculumAreas[year].find(a => a.id === area).label.toLowerCase()}.
                                        </p>
                                        <p style={{fontSize: '0.85rem', color: '#666', marginTop: '1rem'}}>
                                            <a href={curriculumAreas[year].find(a => a.id === area).standard} target="_blank" rel="noopener noreferrer" style={{color: '#0066cc', textDecoration: 'none'}}>
                                                📖 View full Australian Curriculum v9 →
                                            </a>
                                        </p>
                                    </div>
                                )}
                                <div className="form-group">
                                    <label>How frequently is this observed?</label>
                                    <select name="frequency" value={formData.frequency} onChange={handleFormChange}>
                                        <option value="">Select...</option>
                                        <option value="Occasionally">Occasionally (once or twice a week)</option>
                                        <option value="Regularly">Regularly (several times a week)</option>
                                        <option value="Frequently">Frequently (most days)</option>
                                        <option value="Consistently">Consistently (almost daily)</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>How long has this been evident?</label>
                                    <input type="text" name="duration" value={formData.duration} onChange={handleFormChange} placeholder="e.g., For the past 2 months" />
                                </div>
                                <div className="form-group">
                                    <label>Report date</label>
                                    <input type="date" name="date" value={formData.date} onChange={handleFormChange} />
                                </div>
                                <button className="btn btn-primary" onClick={generateReport}>Generate Report</button>
                            </div>
                        )}
                    </>
                )}

                {tab === 'preview' && reportGenerated && (
                    <div className="section">
                        <h2>Your Observation Report</h2>
                        <p style={{marginBottom: '1.5rem', color: '#666'}}>Date: {formData.date} | Year Level: {year}</p>
                        <h3 style={{marginTop: '1.5rem', marginBottom: '1rem'}}>Purpose</h3>
                        <p>This confidential report documents observations regarding student learning and development. It facilitates open communication between home and school.</p>
                        <h3 style={{marginTop: '1.5rem', marginBottom: '1rem'}}>Observations</h3>
                        <p><strong>What I've noticed:</strong> {formData.observations}</p>
                        <p><strong>Frequency:</strong> {formData.frequency}</p>
                        <p><strong>Duration:</strong> {formData.duration}</p>
                        <h3 style={{marginTop: '1.5rem', marginBottom: '1rem'}}>Curriculum Alignment</h3>
                        {curriculumAreas[year] && curriculumAreas[year].find(a => a.id === area) && (
                            <div>
                                <p style={{marginBottom: '1rem', fontSize: '0.95rem'}}><strong>Observed behaviour:</strong></p>
                                <p style={{marginBottom: '1.5rem', paddingLeft: '1rem', borderLeft: '3px solid #ffc107'}}>{formData.observations}</p>
                                <p style={{marginBottom: '1rem', fontSize: '0.95rem'}}><strong>Australian Curriculum expectation for {year}:</strong></p>
                                <p style={{marginBottom: '1.5rem', paddingLeft: '1rem', borderLeft: '3px solid #378ADD', fontSize: '0.95rem', fontStyle: 'italic'}}>"{curriculumAreas[year].find(a => a.id === area).expectation}"</p>
                                <p style={{marginBottom: '1.5rem', padding: '1rem', background: '#f9f9f9', borderRadius: '6px', fontSize: '0.95rem'}}>
                                    <strong>The discrepancy:</strong> There appears to be a gap between what my child is demonstrating at home and the expected achievement standard for {year}. The frequency of these observations ({formData.frequency.toLowerCase()}) suggests this is an ongoing pattern worth exploring together.
                                </p>
                                <p style={{fontSize: '0.85rem', color: '#666'}}>
                                    <a href={curriculumAreas[year].find(a => a.id === area).standard} target="_blank" rel="noopener noreferrer" style={{color: '#0066cc', textDecoration: 'none'}}>
                                        📖 View full Australian Curriculum v9 →
                                    </a>
                                </p>
                            </div>
                        )}
                        <p>I would appreciate the opportunity to discuss these observations. I value your perspective from the school environment and am keen to work together to best support this student's progress.</p>
                        <div style={{marginTop: '2rem'}}>
                            {isPaid ? (
                                <button className="btn btn-primary" onClick={() => window.print()}>⬇️ Download as PDF</button>
                            ) : (
                                <button className="btn btn-secondary" onClick={() => setTab('pricing')}>🔒 Unlock PDF Download</button>
                            )}
                        </div>
                    </div>
                )}

                {tab === 'preview' && !reportGenerated && (
                    <div className="placeholder">
                        <div style={{fontSize: '2rem', marginBottom: '1rem'}}>📄</div>
                        <p>Fill in the form and generate a report to see it here.</p>
                    </div>
                )}

                {tab === 'pricing' && (
                    <div className="section" style={{textAlign: 'center'}}>
                        <h2>Unlock PDF Download</h2>
                        <div style={{fontSize: '2.5rem', color: '#378ADD', margin: '1.5rem 0', fontWeight: 'bold'}}>$4.99</div>
                        <p style={{marginBottom: '1.5rem'}}>One-time payment for unlimited reports</p>
                        <ul style={{textAlign: 'left', display: 'inline-block', marginBottom: '2rem'}}>
                            <li style={{marginBottom: '0.75rem'}}>✓ Download reports as PDF</li>
                            <li style={{marginBottom: '0.75rem'}}>✓ Generate unlimited reports</li>
                            <li style={{marginBottom: '0.75rem'}}>✓ Professional formatting</li>
                            <li style={{marginBottom: '0.75rem'}}>✓ For all year levels</li>
                        </ul>
                        <button className="btn btn-primary" onClick={() => { setIsPaid(true); alert('In production, this connects to Stripe. You now have access to PDF download.'); }}>💳 Unlock for $4.99</button>
                        {isPaid && <p style={{marginTop: '1rem', color: '#1D9E75'}}>✓ Report generator unlocked!</p>}
                    </div>
                )}
            </div>
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
